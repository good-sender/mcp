# Publishes a GitHub Release: container images first, then MCP Registry.
#
# Auth uses GitHub Actions OIDC, so no tokens/secrets are needed to claim the
# io.github.good-sender/* namespace (the workflow runs inside good-sender/mcp).
#
# Containers: ghcr.io/good-sender/mcp, docker.io/goodsender/goodsender-mcp
# Registry: MCPB + OCI packages (registry validates the Docker image exists)
#
# Prereqs:
#   - server.template.json, scripts/gen-server-json.sh
#   - Dockerfile LABEL io.modelcontextprotocol.server.name="io.github.good-sender/goodsender-mcp"

name: Publish release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Published release tag (e.g. v1.2.3)."
        required: true
        type: string

concurrency:
  group: publish-release-${{ github.event.release.tag_name || inputs.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write    # required for GitHub OIDC auth to the MCP Registry

env:
  BINARIES_ASSET_NAME: binaries.zip

jobs:
  publish-container:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.in.outputs.ref }}
      version: ${{ steps.in.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Resolve ref
        id: in
        env:
          INPUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ref="$INPUT_REF"
          else
            ref="${{ github.event.release.tag_name }}"
          fi
          if [[ -z "$ref" ]]; then
            echo "!! ref is required" >&2
            exit 1
          fi
          {
            echo "ref=$ref"
            echo "version=${ref#v}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve and download release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ steps.in.outputs.ref }}
        run: |
          set -euo pipefail
          release_json="$(gh api "repos/${{ github.repository }}/releases/tags/${REF}")"
          draft="$(jq -r '.draft' <<<"$release_json")"
          if [[ "$draft" != "false" ]]; then
            echo "!! release $REF is draft" >&2
            exit 1
          fi
          tag_name="$(jq -r '.tag_name' <<<"$release_json")"
          if [[ "$tag_name" != "$REF" ]]; then
            echo "!! release tag mismatch: expected $REF, got $tag_name" >&2
            exit 1
          fi
          asset_url="$(jq -r --arg name "$BINARIES_ASSET_NAME" \
            '.assets[] | select(.name == $name) | .url' <<<"$release_json")"
          if [[ -z "$asset_url" || "$asset_url" == "null" ]]; then
            echo "!! $BINARIES_ASSET_NAME not found on release $REF" >&2
            exit 1
          fi
          case "$asset_url" in
            https://api.github.com/repos/"${{ github.repository }}"/releases/assets/[0-9]*) ;;
            *)
              echo "!! resolved asset URL is unexpected: $asset_url" >&2
              exit 1
              ;;
          esac
          mkdir -p bin
          curl --fail --location --show-error --silent \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/octet-stream" \
            "$asset_url" -o bin/binaries.zip
          unzip -q bin/binaries.zip -d bin
          test -x bin/goodsender-mcp-linux-amd64
          test -x bin/goodsender-mcp-linux-arm64

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/good-sender/mcp:latest
            ghcr.io/good-sender/mcp:${{ steps.in.outputs.version }}
            ghcr.io/good-sender/mcp:${{ steps.in.outputs.ref }}
            docker.io/goodsender/goodsender-mcp:latest
            docker.io/goodsender/goodsender-mcp:${{ steps.in.outputs.version }}
            docker.io/goodsender/goodsender-mcp:${{ steps.in.outputs.ref }}

      - name: Summary
        env:
          REF: ${{ steps.in.outputs.ref }}
          VERSION: ${{ steps.in.outputs.version }}
        run: |
          {
            echo "## Published containers"
            echo "- \`ghcr.io/good-sender/mcp:latest\`"
            echo "- \`ghcr.io/good-sender/mcp:${VERSION}\`"
            echo "- \`ghcr.io/good-sender/mcp:${REF}\`"
            echo "- \`docker.io/goodsender/goodsender-mcp:latest\`"
            echo "- \`docker.io/goodsender/goodsender-mcp:${VERSION}\`"
            echo "- \`docker.io/goodsender/goodsender-mcp:${REF}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-mcp-registry:
    needs: publish-container
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download released .mcpb
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ needs.publish-container.outputs.ref }}" \
            --repo "${{ github.repository }}" \
            --pattern 'goodsender.mcpb' \
            --output goodsender.mcpb

      - name: Generate server.json (auto SHA-256)
        run: |
          chmod +x scripts/gen-server-json.sh
          ./scripts/gen-server-json.sh goodsender.mcpb "${{ needs.publish-container.outputs.ref }}"
          cat server.json

      - name: Install mcp-publisher
        run: |
          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar -xz mcp-publisher
          sudo install -m 0755 mcp-publisher /usr/local/bin/mcp-publisher
          mcp-publisher --version || true

      - name: Authenticate (GitHub OIDC) and publish
        run: |
          mcp-publisher login github-oidc
          mcp-publisher publish
